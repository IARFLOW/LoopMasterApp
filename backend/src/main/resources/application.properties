spring.application.name=loopmaster-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/loopmaster?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid
spring.datasource.username=loopmaster
spring.datasource.password=loopmaster
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

logging.level.org.springframework.web=INFO
logging.level.com.loopmaster=DEBUG
